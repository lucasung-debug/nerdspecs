version: "2.0"

screen:
  name: 생성된 README 문서
  route: "{repo_root}/README.md"
  layout: markdown-document

data_requirements:
  - resource: project_metadata
    needs: [display_name, generated_summary, tech_stack, detected_language]
  - resource: project_motivation
    needs: [answer]
  - resource: project_config
    needs: [language, landing_page_url]
  - resource: user_preferences
    needs: [language]

components:
  - id: hero_block
    type: hero_section
    position: top
    function: 센터 정렬 글래스 아이콘, 프로젝트 이름, 한 줄 요약, 랜딩/이슈/한국어 링크 배지
    data_source:
      resource: project_metadata

  - id: plain_explanation
    type: text_section
    position: middle
    function: "비개발자 대상 이중 언어 설명 — 'What is this?' + 'Who is it for?'"
    data_source:
      resource: project_motivation

  - id: how_to_use
    type: text_section
    position: middle
    function: 번호 매긴 단계별 사용 가이드, 비개발자 용어만 사용

  - id: tech_details
    type: collapsible
    position: bottom
    function: "개발자용 접힌 섹션 — 기술 스택 표, 설치 명령어"
    data_source:
      resource: project_metadata

  - id: nerdspecs_footer
    type: footer
    position: bottom
    function: "HTML 주석 — Generated by NerdSpecs v0.1"

tests:
  - name: 히어로 블록 필드 채움
    when: display_name 또는 generated_summary 비어있음
    then:
      - placeholder 텍스트로 대체, 빈 문자열 미출력

  - name: 이중 언어 전환
    when: user_preferences.language = ko
    then:
      - 한국어 단락 먼저, 영어 병기

  - name: 개발자 섹션 접힘
    when: GitHub 렌더링 시
    then:
      - <details><summary> 태그로 기본 접힘 상태

  - name: 랜딩 페이지 링크 유효성
    when: landing_page_url 설정됨
    then:
      - 히어로 배지 링크가 해당 URL 지시
      - URL 없으면 배지 자체 생략

  - name: 푸터 주석 존재
    when: README 생성 완료
    then:
      - 마지막 줄 HTML 주석 형태 NerdSpecs 서명
